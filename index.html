<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPECTRAXX.CONNECT</title>

  <style>
    body {
      margin: 0;
      background: #111111;
      color: white;
      text-align: center;
      font-family: "Courier New", monospace;
      font-weight: bold;
      overflow: hidden;
    }

    #connect-screen {
      margin-top: 200px;
    }

    h1 {
      letter-spacing: 20px;
      color: white;
    }

    h3 {
      color: gray;
    }

    #key {
      color: #1a1a1a;
      letter-spacing: 2px;
    }

    #key::before {
      color: gray;
      content: "[ ";
    }

    #key::after {
      color: gray;
      content: " ]";
    }

    #answer {
      background: transparent;
      border: none;
      border-bottom: 4px solid #dddddd;
      color: white;
      font-size: 25px;
      text-align: center;
      width: 350px;
      padding: 5px;
      outline: none;
      font-family: "Courier New", monospace;
      font-weight: bold;
    }

    #answer::placeholder {
      color: #333333;
      font-size: 20px;
    }

    #video-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #loading-text {
      position: absolute;
      color: white;
      font-size: 22px;
      letter-spacing: 6px;
      z-index: 50;
      animation: flicker 1.2s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    #main-video {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    #countdown-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      background: black;
      color: white;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
    }

    #countdown-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      letter-spacing: 4px;
      background: transparent;
    }

    #countdown-title {
      font-size: 18px;
      color: #888;
      margin-bottom: 25px;
    }

    #countdown {
      font-size: 50px;
      color: white;
    }
  </style>
</head>

<body>


  <div id="connect-screen">
    <h1>CONNECTION REQUESTED</h1>
    <h3>PLEASE ENTER THE KEYCODE</h3>
    <p id="key">46524F4D20544845205354415254</p>
    <input type="text" id="answer" placeholder="HEXA" onkeydown="checkEnter(event)">
    <p>PRESS ENTER TO ACCESS</p>
  </div>

  <div id="video-screen">
    <div id="loading-text">PLEASE STANDBY...</div>

    <video id="main-video" playsinline preload="none">
      <source src="https://spectraxx.xyz/Testvideo-24.mp4" type="video/mp4">
    </video>
  </div>

  <div id="countdown-screen">
    <div id="countdown-wrap">
      <div id="countdown-title">INTERDIVING</div>
      <div id="countdown">Loading...</div>
    </div>
  </div>

  <script>
    const connectScreen = document.getElementById("connect-screen");
    const videoScreen = document.getElementById("video-screen");
    const mainVideo = document.getElementById("main-video");
    const loadingText = document.getElementById("loading-text");
    const countdownScreen = document.getElementById("countdown-screen");
    const countdownText = document.getElementById("countdown");

    const releaseDate = new Date("2026-06-01T20:00:00").getTime();

    function toHex(str) {
      let result = "";

      for (let i = 0; i < str.length; i++) {
        result += str.charCodeAt(i).toString(16).toUpperCase();
      }

      return result;
    }

    function checkEnter(event) {
      if (event.key === "Enter") {
        let userInput = document.getElementById("answer").value.toUpperCase().trim();
        let correctHex = "46524F4D20544845205354415254";

        if (toHex(userInput) === correctHex) {
          connectScreen.style.display = "none";
          videoScreen.style.display = "flex";

          mainVideo.style.display = "block";
          mainVideo.load();

          mainVideo.play().then(() => {
            loadingText.style.display = "none";
          }).catch(() => {
            loadingText.innerHTML = "CLICK TO INITIATE";
            loadingText.onclick = function () {
              mainVideo.play();
              loadingText.style.display = "none";
            };
          });
        }
      }
    }

    mainVideo.onended = function () {
      videoScreen.style.display = "none";
      countdownScreen.style.display = "block";
      startCountdown();
    };

    function startCountdown() {
      const timer = setInterval(function () {
        const now = new Date().getTime();
        const distance = releaseDate - now;

        if (distance <= 0) {
          clearInterval(timer);
          countdownText.innerHTML = "SPECTRAXX.PROJECT_OVERTURE<br>--link--";
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        countdownText.innerHTML =
          String(days).padStart(2, "0") + " : " +
          String(hours).padStart(2, "0") + " : " +
          String(minutes).padStart(2, "0") + " : " +
          String(seconds).padStart(2, "0");
      }, 1000);
    }
  </script>

</body>
</html>
